<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>

  <body>
    <div class="container">
      <header>
        <h1>{{ site.title }}</h1>
        <p>{{ site.description }}</p>

        <!-- Social Links -->
        <div class="social-links">
          {% if site.social_links.linkedin %}
            <a href="{{ site.social_links.linkedin }}" target="_blank"><i class="fab fa-linkedin"></i></a>
          {% endif %}
          {% if site.social_links.github %}
            <a href="{{ site.social_links.github }}" target="_blank"><i class="fab fa-github"></i></a>
          {% endif %}
          {% if site.social_links.instagram %}
            <a href="{{ site.social_links.instagram }}" target="_blank"><i class="fab fa-instagram"></i></a>
          {% endif %}
          {% if site.social_links.cv %}
            <a href="{{ site.social_links.cv }}" target="_blank"><i class="fas fa-file"></i> CV</a>
          {% endif %}
        </div>
      </header>

      <main>
        {{ content }}
      </main>

      <footer>
        <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}</p>
      </footer>
    </div>
  </body>
</html>
